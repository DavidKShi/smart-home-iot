<!DOCTYPE html>
<html>

<head>
    <title>Smart Home Dashboard</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .sensor {
            margin: 20px;
            font-size: 1.5em;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
        }

        #led-status {
            font-weight: bold;
            color: gray;
        }

        #led-status.on {
            color: green;
        }

        .detected {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Smart Home Dashboard</h1>

    <div class="sensor">
        Temperature:
        <span id="temp">0</span> °C
    </div>

    <div class="sensor">
        Humidity:
        <span id="hum">0</span> %
    </div>

    <div class="sensor">
        Motion:
        <span id="motion">No Motion</span>
    </div>

    <div class="sensor">
        LED:
        <span id="led-status">OFF</span>

        <br><br>

        <button onclick="setLED(1)">Turn ON</button>
        <button onclick="setLED(0)">Turn OFF</button>
    </div>

    <script>
        function updateData() {

            fetch("/get_data")
                .then(response => response.json())
                .then(d => {

                    document.getElementById("temp").innerText = d.temperature;
                    document.getElementById("hum").innerText = d.humidity;

                    const motionEl = document.getElementById("motion");

                    if (d.motion === 1) {
                        motionEl.innerText = "Motion Detected!";
                        motionEl.className = "detected";
                    } else {
                        motionEl.innerText = "No Motion";
                        motionEl.className = "";
                    }

                    const ledEl = document.getElementById("led-status");

                    if (d.led === 1) {
                        ledEl.innerText = "ON";
                        ledEl.className = "on";
                    } else {
                        ledEl.innerText = "OFF";
                        ledEl.className = "";
                    }
                });
        }

        function setLED(state) {

            const ledEl = document.getElementById("led-status");

            if (state === 1) {
                ledEl.innerText = "ON";
                ledEl.className = "on";
            } else {
                ledEl.innerText = "OFF";
                ledEl.className = "";
            }

            fetch("/led", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    led: state
                })
            });
        }

        // Refresh dashboard every 200ms
        setInterval(updateData, 200);

        // Initial update
        updateData();
    </script>

</body>

</html>
